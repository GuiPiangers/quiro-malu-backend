events {
    worker_connections 1024;
}

http {
    access_log /dev/stdout;
    error_log /dev/stderr;
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Redireciona para HTTPS
    server {
        listen 80;
        server_name release.getclinicas.tech;
        return 301 https://$host$request_uri;
    }

    # App Release
    server {
        listen 443 ssl;
        server_name release.getclinicas.tech;

        ssl_certificate     /etc/letsencrypt/live/release.getclinicas.tech/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/release.getclinicas.tech/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        location / {
            proxy_pass http://release-app:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $http_cf_connecting_ip;
            proxy_set_header X-Forwarded-For $http_cf_connecting_ip;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}