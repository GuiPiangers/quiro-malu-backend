events {
    worker_connections 1024;
}

http {
    access_log /dev/stdout;
    error_log /dev/stderr;
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Redireciona todos os subdomínios para HTTPS
    server {
        listen 80;
        server_name getclinicas.tech metrics.getclinicas.tech deploy.getclinicas.tech;
        return 301 https://$host$request_uri;
    }

    # App principal
    server {
        listen 443 ssl;
        server_name getclinicas.tech;
        ssl_certificate     /etc/letsencrypt/live/getclinicas.tech/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/getclinicas.tech/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        location / {
            proxy_pass http://app:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $http_cf_connecting_ip;
            proxy_set_header X-Forwarded-For $http_cf_connecting_ip;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # Grafana
    server {
        listen 443 ssl;
        server_name metrics.getclinicas.tech;
        ssl_certificate     /etc/letsencrypt/live/metrics.getclinicas.tech/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/metrics.getclinicas.tech/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        location / {
            proxy_pass http://grafana:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $http_cf_connecting_ip;
            proxy_set_header X-Forwarded-For $http_cf_connecting_ip;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # Deploy Webhook
    server {
        listen 443 ssl;
        server_name deploy.getclinicas.tech;
        ssl_certificate     /etc/letsencrypt/live/deploy.getclinicas.tech/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/deploy.getclinicas.tech/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        location / {
            proxy_pass http://deploy-webhook:3333;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $http_cf_connecting_ip;
            proxy_set_header X-Forwarded-For $http_cf_connecting_ip;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}