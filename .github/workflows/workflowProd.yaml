name: Continues Integration and Delivery

on: 
  push:
    branches:
      - main


jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v2
        with:
          node-version: 22.x
      - run: npm ci
      - run: npm run build

  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Instalar cloudflared
        run: |
          curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 \
            -o /usr/local/bin/cloudflared
          chmod +x /usr/local/bin/cloudflared

      - name: Configurar SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          # Configuração do host como no seu ~/.ssh/config
          cat >> ~/.ssh/config <<EOL
          Host meu-servidor
            HostName ssh.quiromalu.com.br
            User guilherme
            ProxyCommand cloudflared access ssh --hostname %h
          EOL

      - name: Testar conexão SSH
        run: ssh -o StrictHostKeyChecking=no meu-servidor "echo Conexão funcionando!"

      
